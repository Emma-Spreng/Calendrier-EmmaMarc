<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Calendrier — Emma & Marc</title>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@900&family=Nunito:wght@600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:#faf8f5;min-height:100vh;display:flex;flex-direction:column;align-items:center}
.site-header{width:100%;text-align:center;padding:2rem 1rem 1rem}
.site-header h1{font-family:'Big Shoulders Display',sans-serif;font-size:clamp(1.4rem,5vw,2.8rem);font-weight:900;color:#2a2a2a;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
.calendar-card{width:min(680px,96vw);border-radius:24px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.13);margin-bottom:3rem;touch-action:pan-y}
.month-header{position:relative;height:160px;display:flex;align-items:flex-end;padding:0 28px 18px;overflow:hidden}
.month-header canvas{position:absolute;inset:0;width:100%;height:100%}
.month-name{font-family:'Big Shoulders Display',sans-serif;font-weight:900;font-size:clamp(3.5rem,11vw,6.5rem);text-transform:uppercase;line-height:1;position:relative;z-index:2;text-shadow:0 2px 10px rgba(0,0,0,.15)}
.month-year{font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:700;position:absolute;top:16px;right:22px;z-index:2;opacity:.7}
.nav-row{display:flex;align-items:center;justify-content:space-between;padding:13px 20px;background:white}
.nav-btn{background:none;border:2px solid #2a2a2a;border-radius:50%;width:36px;height:36px;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;color:#2a2a2a}
.nav-btn:hover{background:#2a2a2a;color:white}
.nav-label{font-family:'Big Shoulders Display',sans-serif;font-size:1rem;font-weight:900;text-transform:uppercase;letter-spacing:.05em;color:#2a2a2a}
.grid-wrapper{padding:0 16px 22px;background:white}
.weekdays{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px}
.weekdays span{text-align:center;font-size:.65rem;font-weight:700;text-transform:uppercase;color:#999;padding:7px 0}
.days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.day-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:8px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:.88rem;font-weight:700;color:#2a2a2a;transition:all .12s;position:relative}
.day-cell:hover{filter:brightness(.88);transform:scale(1.06)}
.day-cell.empty{background:transparent!important;cursor:default;pointer-events:none}
.day-cell.today{outline:2.5px solid #2a2a2a;outline-offset:1px}
.day-cell.has-events::after{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:#c0392b}
.day-cell.selected{outline:2px solid rgba(0,0,0,.4);outline-offset:1px}
/* Multi-day event bands */
.day-cell.multiday-start{border-radius:8px 0 0 8px!important;position:relative}
.day-cell.multiday-mid{border-radius:0!important}
.day-cell.multiday-end{border-radius:0 8px 8px 0!important}
.day-cell.multiday-start::after,.day-cell.multiday-mid::after,.day-cell.multiday-end::after{display:none}
.multiday-band{position:absolute;bottom:6px;left:0;right:0;height:4px;border-radius:2px}
.drawer{background:white;border-top:1px solid #eee;padding:16px 22px;display:none}
.drawer.visible{display:block}
.drawer-date{font-family:'Big Shoulders Display',sans-serif;font-size:1.2rem;font-weight:900;text-transform:uppercase;color:#2a2a2a;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.event-item{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid #f5f5f5;font-size:.85rem}
.event-item:last-child{border-bottom:none}
.event-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.event-title{font-weight:700;color:#2a2a2a}
.event-time{color:#aaa;font-size:.78rem;margin-top:2px}
.no-events{color:#ccc;font-size:.85rem;font-style:italic}
.add-btn{position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;border:none;background:rgba(0,0,0,.15);color:white;font-size:.75rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;line-height:1;padding:0}
.day-cell:hover .add-btn{opacity:1}
@media(hover:none){.add-btn{opacity:.6;width:16px;height:16px;font-size:.65rem}}
.drawer-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.drawer-add{display:inline-flex;align-items:center;gap:5px;background:#2a2a2a;color:white;border:none;border-radius:20px;padding:6px 14px;font-family:'Nunito',sans-serif;font-size:.78rem;font-weight:700;cursor:pointer;transition:opacity .15s}
.drawer-add:hover{opacity:.8}
.drawer-add svg{width:14px;height:14px}
/* Swipe animation */
.calendar-card.swipe-left{animation:swipeLeft .25s ease forwards}
.calendar-card.swipe-right{animation:swipeRight .25s ease forwards}
@keyframes swipeLeft{0%{transform:translateX(0);opacity:1}100%{transform:translateX(-30px);opacity:0}}
@keyframes swipeRight{0%{transform:translateX(0);opacity:1}100%{transform:translateX(30px);opacity:0}}
</style>
</head>
<body>

<header class="site-header">
  <h1>Calendrier — Emma &amp; Marc</h1>
</header>

<div class="calendar-card" id="calCard">
  <div class="month-header" id="monthHeader">
    <canvas id="patCanvas" width="680" height="160"></canvas>
    <span class="month-name" id="monthName"></span>
    <span class="month-year">2026</span>
  </div>
  <div class="nav-row">
    <button class="nav-btn" id="prevBtn">&#8592;</button>
    <span class="nav-label" id="navLabel"></span>
    <button class="nav-btn" id="nextBtn">&#8594;</button>
  </div>
  <div class="grid-wrapper">
    <div class="weekdays">
      <span>Lu</span><span>Ma</span><span>Me</span><span>Je</span><span>Ve</span><span>Sa</span><span>Di</span>
    </div>
    <div class="days-grid" id="daysGrid"></div>
  </div>
  <div class="drawer" id="drawer">
    <div class="drawer-date" id="drawerDate"></div>
    <div id="drawerEvents"></div>
  </div>
</div>

<script>
const API_KEY = "AIzaSyCtxCzRbZFleCurLJECoIbu8dfXESb82gA";
const CAL_ID = "4a40e0db71496c119686970cbde639535e713f0eed6b994072634dfc0a05ce53@group.calendar.google.com";
const MONTHS = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
const SZ = 22;
const MS = [
  {bg:"#f5dde5",ch:"#d4849a",cell:"rgba(240,195,210,.82)",nc:"#7a1a30"},
  {bg:"#dce8f5",ch:"#7aaad4",cell:"rgba(185,215,242,.82)",nc:"#1a3a6a"},
  {bg:"#f0ebe0",ch:"#c4a87a",cell:"rgba(235,220,190,.82)",nc:"#6a4a10"},
  {bg:"#e0ede8",ch:"#7aaa90",cell:"rgba(190,225,205,.82)",nc:"#1a4a30"},
  {bg:"#f5e8d5",ch:"#c87848",cell:"rgba(242,215,180,.82)",nc:"#7a3010"},
  {bg:"#ede0f0",ch:"#a87ac8",cell:"rgba(220,190,238,.82)",nc:"#4a1a6a"},
  {bg:"#fdf0d5",ch:"#d4a840",cell:"rgba(248,228,175,.82)",nc:"#6a4a00"},
  {bg:"#e8ddd5",ch:"#a87860",cell:"rgba(228,208,190,.82)",nc:"#5a2a10"},
  {bg:"#d8e8e0",ch:"#5a9878",cell:"rgba(185,220,205,.82)",nc:"#1a4a30"},
  {bg:"#f5e0d8",ch:"#c86848",cell:"rgba(242,205,188,.82)",nc:"#7a2a10"},
  {bg:"#dde0e8",ch:"#6878a8",cell:"rgba(195,205,228,.82)",nc:"#1a2a5a"},
  {bg:"#f0d8d8",ch:"#b84858",cell:"rgba(232,190,195,.82)",nc:"#6a1020"},
];

const BAND_COLORS = ["#e05a5a","#5a9ae0","#a05ae0","#5ae08a","#e0a05a","#5ae0c8","#e05aa0","#e0c85a"];

function drawVichy(ctx,W,H,bg,ch){
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  for(let i=0;i<W;i+=SZ){ctx.fillStyle=ch;ctx.globalAlpha=.45;ctx.fillRect(i,0,SZ/2,H);}
  for(let j=0;j<H;j+=SZ){ctx.fillStyle=ch;ctx.globalAlpha=.45;ctx.fillRect(0,j,W,SZ/2);}
  for(let i=0;i<W;i+=SZ)for(let j=0;j<H;j+=SZ){ctx.fillStyle=ch;ctx.globalAlpha=.28;ctx.fillRect(i,j,SZ/2,SZ/2);}
  ctx.globalAlpha=1;
}

function formatTime(dateStr){
  if(!dateStr)return '';
  if(dateStr.length===10)return 'Toute la journée';
  const d=new Date(dateStr);
  return d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
}

const eventsCache={};

async function fetchEvents(month){
  if(eventsCache[month])return eventsCache[month];
  const timeMin=new Date(2026,month,1).toISOString();
  const timeMax=new Date(2026,month+1,0,23,59,59).toISOString();
  const url=`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CAL_ID)}/events?key=${API_KEY}&timeMin=${timeMin}&timeMax=${timeMax}&singleEvents=true&orderBy=startTime&maxResults=100`;
  try{
    const res=await fetch(url);
    const data=await res.json();
    const byDay={};
    const multiday=[];
    if(data.items){
      data.items.forEach((ev,i)=>{
        const start=ev.start.dateTime||ev.start.date;
        const end=ev.end.dateTime||ev.end.date;
        // Parse date-only strings (YYYY-MM-DD) without timezone shift
        function parseLocalDate(str){
          if(str.length===10){const p=str.split('-');return new Date(+p[0],+p[1]-1,+p[2]);}
          return new Date(str);
        }
        const startDate=parseLocalDate(start);
        const endDate=parseLocalDate(end);
        const startDay=startDate.getDate();
        const diffDays=Math.round((endDate-startDate)/(1000*60*60*24));
        
        if(!byDay[startDay])byDay[startDay]=[];
        byDay[startDay].push({
          t:ev.summary||'Sans titre',
          h:formatTime(start),
          c:BAND_COLORS[i%BAND_COLORS.length]
        });

        // Multi-day events
        if(diffDays>1){
          const color=BAND_COLORS[i%BAND_COLORS.length];
          for(let d=0;d<diffDays;d++){
            const dayDate=new Date(startDate.getFullYear(),startDate.getMonth(),startDate.getDate()+d);
            if(dayDate.getMonth()===month){
              const dayNum=dayDate.getDate();
              if(!byDay[dayNum])byDay[dayNum]=[];
              if(d>0){
                byDay[dayNum].push({t:ev.summary||'Sans titre',h:'Toute la journée',c:color});
              }
              multiday.push({day:dayNum,pos:d===0?'start':d===diffDays-1?'end':'mid',color});
            }
          }
        }
      });
    }
    eventsCache[month]={byDay,multiday};
    return eventsCache[month];
  }catch(e){
    return{byDay:{},multiday:[]};
  }
}

let currentMonth=new Date().getMonth();
let selectedCell=null;
let isAnimating=false;

function gcalAddUrl(day){
  const dt=new Date(2026,currentMonth,day);
  const next=new Date(2026,currentMonth,day+1);
  function fmt(d){return d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0');}
  return `https://calendar.google.com/calendar/r/eventedit?dates=${fmt(dt)}/${fmt(next)}&src=${encodeURIComponent(CAL_ID)}`;
}

function openGcal(day,e){
  if(e){e.stopPropagation();}
  window.open(gcalAddUrl(day),'_blank');
}

async function render(){
  const m=currentMonth,s=MS[m];
  const canvas=document.getElementById('patCanvas');
  const ctx=canvas.getContext('2d');
  const W=canvas.offsetWidth||680;
  canvas.width=W;canvas.height=160;
  drawVichy(ctx,W,160,s.bg,s.ch);
  document.getElementById('monthName').textContent=MONTHS[m];
  document.getElementById('monthName').style.color=s.nc;
  document.getElementById('navLabel').textContent=MONTHS[m]+' 2026';
  document.getElementById('drawer').classList.remove('visible');
  selectedCell=null;

  const grid=document.getElementById('daysGrid');
  grid.innerHTML='';
  const fd=new Date(2026,m,1).getDay(),off=fd===0?6:fd-1;
  const dim=new Date(2026,m+1,0).getDate();
  const td=new Date(),isNow=td.getFullYear()===2026&&td.getMonth()===m;

  for(let i=0;i<off;i++){
    const e=document.createElement('div');e.className='day-cell empty';grid.appendChild(e);
  }

  const {byDay,multiday}=await fetchEvents(m);

  for(let d=1;d<=dim;d++){
    const cell=document.createElement('div');
    cell.className='day-cell';
    cell.textContent=d;
    cell.style.background=s.cell;
    const evs=byDay[d]||[];
    if(evs.length)cell.classList.add('has-events');
    if(isNow&&d===td.getDate())cell.classList.add('today');

    // Multi-day band
    const mdInfo=multiday.find(x=>x.day===d);
    if(mdInfo){
      cell.classList.add('multiday-'+mdInfo.pos);
      const band=document.createElement('div');
      band.className='multiday-band';
      band.style.background=mdInfo.color;
      cell.appendChild(band);
    }

    cell.addEventListener('click',()=>showDrawer(d,evs,cell));

    const addBtn=document.createElement('button');
    addBtn.className='add-btn';
    addBtn.textContent='+';
    addBtn.title='Ajouter un événement';
    addBtn.addEventListener('click',(e)=>openGcal(d,e));
    cell.appendChild(addBtn);

    grid.appendChild(cell);
  }
}

function showDrawer(day,evs,cell){
  const drawer=document.getElementById('drawer');
  if(selectedCell===cell){selectedCell=null;cell.classList.remove('selected');drawer.classList.remove('visible');return;}
  if(selectedCell)selectedCell.classList.remove('selected');
  selectedCell=cell;cell.classList.add('selected');
  document.getElementById('drawerDate').textContent=MONTHS[currentMonth]+' '+day+' 2026';
  const addHtml=`<button class="drawer-add" onclick="openGcal(${day})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Ajouter</button>`;
  document.getElementById('drawerDate').innerHTML=`<span>${MONTHS[currentMonth]} ${day} 2026</span>${addHtml}`;
  document.getElementById('drawerEvents').innerHTML=evs.length
    ?evs.map(e=>`<div class="event-item"><span class="event-dot" style="background:${e.c}"></span><div><div class="event-title">${e.t}</div><div class="event-time">${e.h}</div></div></div>`).join('')
    :'<p class="no-events">Journée libre ✨</p>';
  drawer.classList.add('visible');
}

function changeMonth(dir){
  if(isAnimating)return;
  isAnimating=true;
  const card=document.getElementById('calCard');
  card.classList.add(dir>0?'swipe-left':'swipe-right');
  setTimeout(()=>{
    card.classList.remove('swipe-left','swipe-right');
    currentMonth=(currentMonth+dir+12)%12;
    render();
    isAnimating=false;
  },200);
}

document.getElementById('prevBtn').addEventListener('click',()=>changeMonth(-1));
document.getElementById('nextBtn').addEventListener('click',()=>changeMonth(1));

// Swipe touch support
let touchStartX=0,touchStartY=0;
const card=document.getElementById('calCard');
card.addEventListener('touchstart',e=>{
  touchStartX=e.touches[0].clientX;
  touchStartY=e.touches[0].clientY;
},{passive:true});
card.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-touchStartX;
  const dy=e.changedTouches[0].clientY-touchStartY;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>50){
    changeMonth(dx<0?1:-1);
  }
},{passive:true});

render();
</script>
</body>
</html>
